{% extends 'base.html' %}
{% block title %}Submit ILL Request{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card p-4">
      <h5 class="fw-bold mb-3"><i class="bi bi-arrow-left-right"></i> Submit Interlibrary Loan Request</h5>
      <p class="text-muted small">Request a book not available in MSICT Library from another institution.</p>
      <form method="post">{% csrf_token %}
        <div class="mb-3"><label class="form-label">Book Title <span class="text-danger">*</span></label><input type="text" name="title" class="form-control" required></div>
        <div class="mb-3"><label class="form-label">Author</label><input type="text" name="author" class="form-control"></div>
        <div class="mb-3"><label class="form-label">ISBN</label><input type="text" name="isbn" class="form-control" maxlength="13"></div>
        <div class="mb-3"><label class="form-label">Preferred Source Library</label><input type="text" name="source_library" class="form-control" placeholder="e.g. UDSM Library, NML Dar es Salaam"></div>
        <div class="mb-3"><label class="form-label">Additional Notes</label><textarea name="notes" class="form-control" rows="3"></textarea></div>
        <button type="submit" class="btn btn-msict"><i class="bi bi-send"></i> Submit Request</button>
        <a href="{% url 'member_dashboard' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
