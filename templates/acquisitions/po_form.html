{% extends 'base.html' %}
{% block title %}New Purchase Order{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card p-4">
      <h5 class="fw-bold mb-3"><i class="bi bi-cart-plus"></i> New Purchase Order</h5>
      <form method="post">{% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Vendor</label>
          <select name="vendor" class="form-select">
            <option value="">-- Select Vendor --</option>
            {% for v in vendors %}<option value="{{ v.pk }}">{{ v.name }}</option>{% endfor %}
          </select>
        </div>
        <button type="submit" class="btn btn-msict"><i class="bi bi-save"></i> Create Draft</button>
        <a href="{% url 'purchase_order_list' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
