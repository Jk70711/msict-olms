{% extends 'base.html' %}
{% block title %}Add Vendor{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card p-4">
      <h5 class="fw-bold mb-3"><i class="bi bi-shop"></i> Add Vendor</h5>
      <form method="post">{% csrf_token %}
        <div class="mb-3"><label class="form-label">Name <span class="text-danger">*</span></label><input type="text" name="name" class="form-control" required></div>
        <div class="mb-3"><label class="form-label">Contact Person</label><input type="text" name="contact_person" class="form-control"></div>
        <div class="mb-3"><label class="form-label">Email</label><input type="email" name="email" class="form-control"></div>
        <div class="mb-3"><label class="form-label">Phone</label><input type="text" name="phone" class="form-control"></div>
        <div class="mb-3"><label class="form-label">Address</label><textarea name="address" class="form-control" rows="2"></textarea></div>
        <button type="submit" class="btn btn-msict"><i class="bi bi-save"></i> Save</button>
        <a href="{% url 'vendor_list' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
