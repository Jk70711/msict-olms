{% extends 'base.html' %}
{% block title %}Verify OTP – MSICT OLMS{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-4">
    <div class="card p-4 shadow">
      <h5 class="fw-bold"><i class="bi bi-shield-check"></i> Enter OTP</h5>
      <p class="text-muted small">A 6-digit code was sent to your phone and email. Valid for 10 minutes.</p>
      <form method="post">{% csrf_token %}
        <div class="mb-3">
          <label class="form-label">OTP Code</label>
          <input type="text" name="otp_code" class="form-control form-control-lg text-center letter-spacing" maxlength="6" placeholder="______" required autofocus>
        </div>
        <div class="d-grid"><button type="submit" class="btn btn-msict">Verify OTP</button></div>
      </form>
      <div class="text-center mt-2"><a href="{% url 'forgot_password' %}" class="small">Resend OTP</a></div>
    </div>
  </div>
</div>
{% endblock %}
