{% extends 'base.html' %}
{% block title %}Change Password{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card p-4">
      <h5 class="fw-bold mb-3"><i class="bi bi-key"></i> Change Password</h5>
      <form method="post">{% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Current Password</label>
          <input type="password" name="old_password" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">New Password <small class="text-muted">(min 8 chars)</small></label>
          <input type="password" name="new_password" class="form-control" required minlength="8">
        </div>
        <div class="mb-3">
          <label class="form-label">Confirm New Password</label>
          <input type="password" name="confirm_password" class="form-control" required minlength="8">
        </div>
        <button type="submit" class="btn btn-msict"><i class="bi bi-check-lg"></i> Update Password</button>
        <a href="{% url 'profile' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
