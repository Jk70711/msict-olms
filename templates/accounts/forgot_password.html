{% extends 'base.html' %}
{% block title %}Forgot Password – MSICT OLMS{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5 col-lg-4">
    <div class="card p-4 shadow">
      <h5 class="fw-bold mb-3"><i class="bi bi-key"></i> Reset Password</h5>
      <p class="text-muted small">Enter your Army Number or Email to receive an OTP.</p>
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Army Number or Email</label>
          <input type="text" name="identifier" class="form-control" placeholder="e.g. MT 134513 or email" required>
        </div>
        <div class="d-grid">
          <button type="submit" class="btn btn-msict">Send OTP</button>
        </div>
      </form>
      <div class="text-center mt-3"><a href="{% url 'login' %}" class="small">Back to Login</a></div>
    </div>
  </div>
</div>
{% endblock %}
