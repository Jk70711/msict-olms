{% extends 'base.html' %}
{% block title %}Add Category{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card p-4">
      <h5 class="fw-bold mb-3"><i class="bi bi-tags"></i> Add Category</h5>
      <form method="post">{% csrf_token %}
        <div class="mb-3">
          <label class="form-label">Category Name <span class="text-danger">*</span></label>
          <input type="text" name="name" class="form-control" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Parent Category <small class="text-muted">(optional)</small></label>
          <select name="parent" class="form-select">
            <option value="">-- Top Level --</option>
            {% for cat in categories %}<option value="{{ cat.pk }}">{{ cat.name }}</option>{% endfor %}
          </select>
        </div>
        <button type="submit" class="btn btn-msict"><i class="bi bi-save"></i> Save</button>
        <a href="{% url 'category_list' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
