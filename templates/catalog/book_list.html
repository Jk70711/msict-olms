{% extends 'base.html' %}
{% block title %}Book Catalog{% endblock %}
{% block content %}
<style>
  .search-box {
    position: relative;
  }
  .search-suggestions {
    position: absolute;
    left: 0;
    right: 0;
    top: calc(100% + .35rem);
    z-index: 1050;
    margin-top: 0;
    padding: .35rem;
    background: var(--body-bg);
    border-radius: var(--radius-md);
    border: 1px solid var(--border);
    max-height: 260px;
    overflow-y: auto;
    box-shadow: 0 10px 24px rgba(0, 0, 0, .12);
  }
  .suggestion-item {
    padding: .4rem .6rem;
    cursor: pointer;
    border-radius: var(--radius-sm);
    font-size: .85rem;
    transition: background .12s;
  }
  .suggestion-item:hover {
    background: var(--accent-light);
  }
  .suggestion-item.active {
    background: var(--accent-light);
    outline: 1px solid rgba(13, 110, 253, .25);
  }
  .suggestion-title {
    font-weight: 600;
    color: var(--text-primary);
  }
  .suggestion-meta {
    font-size: .75rem;
    color: var(--text-muted);
  }
  .search-loading {
    text-align: center;
    color: var(--text-muted);
    font-size: .85rem;
    padding: .5rem;
  }
</style>

<div class="d-flex justify-content-between align-items-center mb-3">
  <h4 class="fw-bold mb-0"><i class="bi bi-book"></i> Book Catalog</h4>
  {% if can_manage %}
  <a href="{% url 'book_create' %}" class="btn btn-msict"><i class="bi bi-plus-circle"></i> Add Book</a>
  {% endif %}
</div>
<div class="card p-3 mb-3">
  <form method="get" class="row g-2" data-no-auto-submit="true">
    <div class="col-md-5 search-box">
      <input type="text" name="q" class="form-control" id="searchInput" placeholder="Search title, author, ISBN..." value="{{ query }}" autocomplete="off" aria-autocomplete="list" aria-controls="searchSuggestions" aria-expanded="false">
      <div id="searchSuggestions" class="search-suggestions d-none" role="listbox"></div>
    </div>
    <div class="col-md-3">
      <select name="category" class="form-select" id="categoryFilter">
        <option value="">All Categories</option>
        {% for c in categories %}<option value="{{ c.pk }}" {% if selected_category == c.pk|stringformat:"i" %}selected{% endif %}>{{ c.name }}</option>{% endfor %}
      </select>
    </div>
    <div class="col-md-2"><button type="submit" class="btn btn-msict w-100"><i class="bi bi-search"></i></button></div>
    <div class="col-md-2"><a href="{% url 'book_list' %}" class="btn btn-outline-secondary w-100">Clear</a></div>
  </form>
</div>
<div class="card">
  <div class="table-responsive">
    <table class="table table-hover align-middle mb-0">
      <thead>
        <tr><th>S/N</th><th>Title</th><th>Author</th><th>ISBN</th><th>Category</th><th>Copies</th><th>Available</th><th>Softcopy</th><th>Actions</th></tr>
      </thead>
      <tbody id="bookTableBody">{% include 'catalog/partials/book_table_rows.html' %}</tbody>
    </table>
  </div>
</div>

<script>
(function() {
  const searchInput = document.getElementById('searchInput');
  const searchSuggestions = document.getElementById('searchSuggestions');
  const categoryFilter = document.getElementById('categoryFilter');
  const tableBody = document.getElementById('bookTableBody');
  const form = searchInput.closest('form');
  let debounceTimer = null;
  let tableDebounceTimer = null;
  let activeIndex = -1;
  let currentResults = [];
  let activeRequest = null;
  let activeTableRequest = null;
  let tableRequestSeq = 0;

  function hideSuggestions() {
    searchSuggestions.classList.add('d-none');
    searchInput.setAttribute('aria-expanded', 'false');
    activeIndex = -1;
  }

  function showSuggestions() {
    searchSuggestions.classList.remove('d-none');
    searchInput.setAttribute('aria-expanded', 'true');
  }

  function moveCaretToEnd(inputEl) {
    const length = inputEl.value.length;
    inputEl.setSelectionRange(length, length);
  }

  function renderSuggestions(results) {
    currentResults = results;
    activeIndex = -1;

    if (!results.length) {
      searchSuggestions.innerHTML = '<div class="suggestion-item text-muted">No books found</div>';
      showSuggestions();
      return;
    }

    searchSuggestions.innerHTML = results.map((book, index) => `
      <div
        class="suggestion-item"
        role="option"
        data-index="${index}"
        data-title="${book.title.replace(/"/g, '&quot;')}"
      >
        <div class="suggestion-title">${book.title}</div>
        <div class="suggestion-meta">${book.author} · ${book.isbn || 'N/A'}</div>
      </div>
    `).join('');
    showSuggestions();
  }

  function setActive(index) {
    const items = searchSuggestions.querySelectorAll('.suggestion-item[data-index]');
    items.forEach((item) => item.classList.remove('active'));
    if (!items.length || index < 0 || index >= items.length) {
      activeIndex = -1;
      return;
    }
    activeIndex = index;
    items[activeIndex].classList.add('active');
    items[activeIndex].scrollIntoView({ block: 'nearest' });
  }

  function applySuggestion(index) {
    if (index < 0 || index >= currentResults.length) return;
    searchInput.value = currentResults[index].title;
    hideSuggestions();
    searchInput.focus();
    moveCaretToEnd(searchInput);
    updateBookTable();
  }

  searchInput.addEventListener('input', function() {
    const query = this.value.trim();
    clearTimeout(debounceTimer);
    clearTimeout(tableDebounceTimer);

    if (!query) {
      if (activeRequest) activeRequest.abort();
      hideSuggestions();
    }

    debounceTimer = setTimeout(() => {
      if (query) {
        performSearch(query);
      }
    }, 300);

    tableDebounceTimer = setTimeout(() => {
      updateBookTable({ preserveTypingFocus: true });
    }, 250);
  });

  function performSearch(query) {
    if (activeRequest) activeRequest.abort();
    activeRequest = new AbortController();

    searchSuggestions.innerHTML = '<div class="search-loading"><i class="bi bi-hourglass-split"></i> Searching...</div>';
    showSuggestions();

    fetch(`/catalog/search/?q=${encodeURIComponent(query)}`, { signal: activeRequest.signal })
      .then(response => response.json())
      .then(data => {
        renderSuggestions(data.results || []);
      })
      .catch(error => {
        if (error.name === 'AbortError') return;
        searchSuggestions.innerHTML = '<div class="suggestion-item">Error searching</div>';
        showSuggestions();
      });
  }

  function updateBookTable(options) {
    const preserveTypingFocus = Boolean(options && options.preserveTypingFocus);
    const requestId = ++tableRequestSeq;

    if (activeTableRequest) activeTableRequest.abort();
    activeTableRequest = new AbortController();

    const params = new URLSearchParams();
    params.set('ajax', '1');
    params.set('q', searchInput.value.trim());
    params.set('category', categoryFilter.value);

    const caretStart = searchInput.selectionStart;
    const caretEnd = searchInput.selectionEnd;

    fetch(`${form.getAttribute('action') || window.location.pathname}?${params.toString()}`, {
      headers: { 'X-Requested-With': 'XMLHttpRequest' },
      signal: activeTableRequest.signal,
    })
      .then((response) => response.json())
      .then((data) => {
        if (requestId !== tableRequestSeq) return;
        if (typeof data.table_rows_html === 'string') {
          tableBody.innerHTML = data.table_rows_html;
          if (preserveTypingFocus) {
            searchInput.focus({ preventScroll: true });
            const len = searchInput.value.length;
            const start = typeof caretStart === 'number' ? Math.min(caretStart, len) : len;
            const end = typeof caretEnd === 'number' ? Math.min(caretEnd, len) : len;
            searchInput.setSelectionRange(start, end);
          }
        }
      })
      .catch((error) => {
        if (error.name !== 'AbortError') {
          console.error('Live table update failed:', error);
        }
      });
  }

  searchInput.addEventListener('keydown', function(event) {
    const visible = !searchSuggestions.classList.contains('d-none');
    const hasItems = currentResults.length > 0;
    if (!visible || !hasItems) return;

    if (event.key === 'ArrowDown') {
      event.preventDefault();
      setActive(activeIndex + 1 >= currentResults.length ? 0 : activeIndex + 1);
      return;
    }
    if (event.key === 'ArrowUp') {
      event.preventDefault();
      setActive(activeIndex - 1 < 0 ? currentResults.length - 1 : activeIndex - 1);
      return;
    }
    if (event.key === 'Enter' && activeIndex >= 0) {
      event.preventDefault();
      applySuggestion(activeIndex);
      return;
    }
    if (event.key === 'Escape') {
      hideSuggestions();
    }
  });

  searchSuggestions.addEventListener('mousedown', function(event) {
    const item = event.target.closest('.suggestion-item[data-index]');
    if (!item) return;
    // Prevent input blur so cursor stays in typing area.
    event.preventDefault();
    applySuggestion(Number(item.dataset.index));
  });

  document.addEventListener('click', function(event) {
    if (!event.target.closest('.search-box')) {
      hideSuggestions();
    }
  });

  categoryFilter.addEventListener('change', function() {
    updateBookTable();
    const query = searchInput.value.trim();
    if (query) {
      performSearch(query);
    } else {
      hideSuggestions();
    }
  });

  form.addEventListener('submit', function() {
    hideSuggestions();
  });
})();
</script>
{% endblock %}
