{% extends 'base.html' %}
{% block title %}Add External Library{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card p-4">
      <h5 class="fw-bold mb-3"><i class="bi bi-globe"></i> Add External Library</h5>
      <form method="post">{% csrf_token %}
        <div class="mb-3"><label class="form-label">Library Name <span class="text-danger">*</span></label><input type="text" name="name" class="form-control" required></div>
        <div class="mb-3"><label class="form-label">Base URL <span class="text-danger">*</span></label><input type="url" name="base_url" class="form-control" placeholder="https://library.example.com/search" required></div>
        <div class="mb-3"><label class="form-label">Search Query Parameter</label><input type="text" name="search_param" class="form-control" value="q" placeholder="q"><div class="form-text">The URL parameter name for the search query (e.g. "q", "query", "search")</div></div>
        <div class="mb-3">
          <label class="form-label">Library Type</label>
          <select name="lib_type" class="form-select">
            <option value="opac">OPAC</option>
            <option value="koha">Koha</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-check mb-3"><input class="form-check-input" type="checkbox" name="is_active" id="activeCheck" checked><label class="form-check-label" for="activeCheck">Active</label></div>
        <button type="submit" class="btn btn-msict"><i class="bi bi-save"></i> Save</button>
        <a href="{% url 'external_library_list' %}" class="btn btn-outline-secondary ms-2">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
