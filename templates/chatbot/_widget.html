<style>
  #aiBtn {
    position: fixed; right: 22px; bottom: 22px;
    z-index: 5000;
    width: 58px; height: 58px;
    border-radius: 50%;
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
    color: #fff;
    border: none;
    box-shadow: 0 8px 24px rgba(99, 102, 241, .4);
    cursor: pointer;
    font-size: 1.7rem;
    display: flex; align-items: center; justify-content: center;
    transition: transform .2s, box-shadow .2s;
  }
  #aiBtn:hover { transform: scale(1.06); box-shadow: 0 10px 28px rgba(99, 102, 241, .55); }
  #aiBtn .ai-pulse {
    position: absolute; inset: -4px;
    border-radius: 50%;
    border: 2px solid rgba(99, 102, 241, .5);
    animation: aiPulse 2s infinite;
  }
  @keyframes aiPulse {
    0%   { transform: scale(1);   opacity: .8; }
    100% { transform: scale(1.3); opacity: 0;  }
  }

  #aiPanel {
    position: fixed; right: 22px; bottom: 92px;
    z-index: 5000;
    width: 380px; max-width: calc(100vw - 32px);
    height: 560px; max-height: calc(100vh - 120px);
    background: var(--card-bg, #fff);
    border: 1px solid var(--border, #e5e7eb);
    border-radius: 16px;
    box-shadow: 0 20px 50px rgba(0,0,0,.18);
    display: none;
    flex-direction: column;
    overflow: hidden;
  }
  #aiPanel.open { display: flex; animation: aiSlide .25s ease-out; }
  @keyframes aiSlide {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  #aiPanel .ai-header {
    padding: .9rem 1rem;
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
    color: #fff;
    display: flex; align-items: center; gap: .65rem;
  }
  #aiPanel .ai-header .ai-avatar {
    width: 36px; height: 36px;
    background: rgba(255,255,255,.2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem;
  }
  #aiPanel .ai-header .ai-title { font-weight: 700; font-size: .95rem; line-height: 1.1; }
  #aiPanel .ai-header .ai-sub   { font-size: .72rem; opacity: .85; }
  #aiPanel .ai-header .ai-actions { margin-left: auto; display: flex; gap: .25rem; }
  #aiPanel .ai-header button {
    background: rgba(255,255,255,.15);
    border: none; color: #fff;
    width: 30px; height: 30px;
    border-radius: 8px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: .9rem;
    transition: background .15s;
  }
  #aiPanel .ai-header button:hover { background: rgba(255,255,255,.3); }

  #aiMessages {
    flex: 1; overflow-y: auto;
    padding: 1rem;
    background: var(--body-bg, #f8fafc);
    display: flex; flex-direction: column; gap: .55rem;
    min-height: 0;
  }
  .ai-msg {
    max-width: 85%;
    padding: .55rem .85rem;
    border-radius: 14px;
    font-size: .82rem;
    line-height: 1.5;
    word-wrap: break-word;
  }
  .ai-msg.user {
    align-self: flex-end;
    background: #6366f1; color: #fff;
    border-bottom-right-radius: 4px;
  }
  .ai-msg.assistant {
    align-self: flex-start;
    background: var(--card-bg, #fff);
    border: 1px solid var(--border, #e5e7eb);
    color: var(--text-primary, #0f172a);
    border-bottom-left-radius: 4px;
  }
  .ai-msg p:last-child { margin-bottom: 0; }
  .ai-msg a { color: inherit; text-decoration: underline; }
  .ai-msg.user a { color: #fff; }
  .ai-msg pre {
    background: rgba(0,0,0,.06);
    padding: .5rem .65rem;
    border-radius: 6px;
    font-size: .75rem;
    overflow-x: auto;
  }

  .ai-book-card {
    border: 1px solid var(--border, #e5e7eb);
    border-radius: 10px;
    padding: .55rem .7rem;
    margin: .35rem 0 .15rem;
    background: rgba(99, 102, 241, .04);
    font-size: .78rem;
  }
  .ai-book-card a { font-weight: 600; color: #6366f1; }

  .ai-typing {
    align-self: flex-start;
    color: var(--text-muted, #94a3b8);
    font-size: .78rem;
    font-style: italic;
    padding: .25rem .5rem;
  }
  .ai-typing .dot {
    display: inline-block; width: 5px; height: 5px;
    background: currentColor; border-radius: 50%;
    margin: 0 1px; animation: aiDot 1.2s infinite;
  }
  .ai-typing .dot:nth-child(2) { animation-delay: .2s; }
  .ai-typing .dot:nth-child(3) { animation-delay: .4s; }
  @keyframes aiDot { 0%,80%,100%{opacity:.3} 40%{opacity:1} }

  #aiComposer {
    border-top: 1px solid var(--border, #e5e7eb);
    background: var(--card-bg, #fff);
    padding: .65rem .8rem;
    display: flex; gap: .45rem; align-items: flex-end;
  }
  #aiComposer textarea {
    flex: 1; resize: none;
    border: 1px solid var(--border, #e5e7eb);
    border-radius: 18px;
    padding: .5rem .85rem;
    font-size: .82rem; line-height: 1.4;
    max-height: 100px;
    background: var(--body-bg, #f8fafc);
    color: var(--text-primary, #0f172a);
    font-family: inherit;
  }
  #aiComposer textarea:focus { outline: none; border-color: #6366f1; }
  #aiSend {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
    color: #fff; border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
  }
  #aiSend:disabled { opacity: .5; cursor: not-allowed; }

  .ai-suggestion {
    display: inline-block;
    background: rgba(99, 102, 241, .08);
    color: #6366f1;
    border: 1px solid rgba(99, 102, 241, .2);
    padding: .35rem .65rem;
    border-radius: 14px;
    font-size: .72rem;
    margin: .15rem;
    cursor: pointer;
    transition: all .15s;
  }
  .ai-suggestion:hover { background: #6366f1; color: #fff; }

  .ai-welcome {
    text-align: center; padding: 1.5rem 1rem;
    color: var(--text-muted, #94a3b8);
  }
  .ai-welcome h6 { color: var(--text-primary, #0f172a); margin-bottom: .35rem; font-weight: 700; }

  @media (max-width: 480px) {
    #aiPanel {
      right: 8px; left: 8px; bottom: 80px;
      width: auto;
      height: calc(100vh - 100px);
    }
    #aiBtn { right: 14px; bottom: 14px; }
  }
</style>

<button id="aiBtn" title="Ask the AI Library Assistant" aria-label="Open AI assistant">
  <span class="ai-pulse"></span>
  <i class="bi bi-robot"></i>
</button>

<div id="aiPanel" role="dialog" aria-label="AI Library Assistant">
  <div class="ai-header">
    <div class="ai-avatar"><i class="bi bi-robot"></i></div>
    <div>
      <div class="ai-title">Library Assistant</div>
      <div class="ai-sub">English &amp; Kiswahili • powered by Gemini</div>
    </div>
    <div class="ai-actions">
      <button id="aiResetBtn" title="Start new chat" aria-label="Reset conversation">
        <i class="bi bi-arrow-clockwise"></i>
      </button>
      <button id="aiCloseBtn" title="Close" aria-label="Close">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>
  </div>

  <div id="aiMessages">
    <div class="ai-welcome" id="aiWelcome">
      <div style="font-size:2.2rem;margin-bottom:.5rem">📚</div>
      <h6>Karibu! / Welcome!</h6>
      <p class="small mb-3">Ask me about books, topics, or how the library works.</p>
      <div>
        <span class="ai-suggestion" data-q="Do you have any networking books?">Networking books?</span>
        <span class="ai-suggestion" data-q="Recommend Python programming books">Python recommendations</span>
        <span class="ai-suggestion" data-q="Je, kuna kitabu cha cyber security?">Kiswahili: cyber security</span>
        <span class="ai-suggestion" data-q="What are the library borrowing rules?">Borrowing rules</span>
      </div>
    </div>
  </div>

  <form id="aiComposer" autocomplete="off">
    <textarea id="aiInput" rows="1" placeholder="Ask in English or Swahili…" maxlength="2000"></textarea>
    <button type="submit" id="aiSend" title="Send"><i class="bi bi-send-fill"></i></button>
  </form>
</div>

<script>
(function() {
  const btn      = document.getElementById('aiBtn');
  const panel    = document.getElementById('aiPanel');
  const closeBtn = document.getElementById('aiCloseBtn');
  const resetBtn = document.getElementById('aiResetBtn');
  const msgsBox  = document.getElementById('aiMessages');
  const welcome  = document.getElementById('aiWelcome');
  const composer = document.getElementById('aiComposer');
  const input    = document.getElementById('aiInput');
  const sendBtn  = document.getElementById('aiSend');

  const HISTORY_URL = '{% url "assistant_history" %}';
  const SEND_URL    = '{% url "assistant_send" %}';
  const RESET_URL   = '{% url "assistant_reset" %}';

  function getCsrf() {
    const m = document.cookie.match(/(?:^|;\s*)csrftoken=([^;]+)/);
    return m ? decodeURIComponent(m[1]) : '';
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }

  // Light markdown: **bold**, *italic*, `code`, [text](url), bullet lists, line breaks.
  function renderMarkdown(s) {
    let html = escapeHtml(s);
    html = html.replace(/```([\s\S]*?)```/g, (_, c) => `<pre>${c}</pre>`);
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/(?:^|\s)\*([^*\n]+)\*(?=\s|$)/g, ' <em>$1</em>');
    html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g,
      '<a href="$2" target="_blank" rel="noopener">$1</a>');
    // bullet lines
    html = html.replace(/^(?:[-*]) (.+)$/gm, '<li>$1</li>');
    html = html.replace(/(<li>.+<\/li>)(?:\n(?=<li>))?/gs, m => `<ul>${m}</ul>`);
    html = html.replace(/<\/ul>\s*<ul>/g, '');
    html = html.replace(/\n/g, '<br>');
    return html;
  }

  function appendMsg(role, content) {
    if (welcome) welcome.style.display = 'none';
    const div = document.createElement('div');
    div.className = 'ai-msg ' + role;
    div.innerHTML = renderMarkdown(content);
    msgsBox.appendChild(div);
    msgsBox.scrollTop = msgsBox.scrollHeight;
    return div;
  }

  function showTyping() {
    const t = document.createElement('div');
    t.className = 'ai-typing';
    t.id = 'aiTyping';
    t.innerHTML = 'Thinking <span class="dot"></span><span class="dot"></span><span class="dot"></span>';
    msgsBox.appendChild(t);
    msgsBox.scrollTop = msgsBox.scrollHeight;
  }
  function hideTyping() {
    const t = document.getElementById('aiTyping');
    if (t) t.remove();
  }

  let historyLoaded = false;
  async function loadHistory() {
    if (historyLoaded) return;
    historyLoaded = true;
    try {
      const r = await fetch(HISTORY_URL, { credentials: 'same-origin' });
      const d = await r.json();
      if (d.messages && d.messages.length) {
        if (welcome) welcome.style.display = 'none';
        d.messages.forEach(m => appendMsg(m.role, m.content));
      }
    } catch (e) { /* ignore */ }
  }

  async function send(text) {
    if (!text) return;
    appendMsg('user', text);
    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;
    showTyping();
    try {
      const r = await fetch(SEND_URL, {
        method: 'POST',
        credentials: 'same-origin',
        headers: {
          'Content-Type': 'application/json',
          'X-CSRFToken': getCsrf(),
        },
        body: JSON.stringify({ message: text }),
      });
      hideTyping();
      if (!r.ok) {
        appendMsg('assistant', '_Sorry, something went wrong. Please try again._');
        return;
      }
      const d = await r.json();
      appendMsg('assistant', d.reply || '…');
    } catch (e) {
      hideTyping();
      appendMsg('assistant', '_Network error — check your connection and try again._');
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  // Open / close
  function openPanel() {
    panel.classList.add('open');
    btn.style.display = 'none';
    loadHistory();
    setTimeout(() => input.focus(), 250);
  }
  function closePanel() {
    panel.classList.remove('open');
    btn.style.display = 'flex';
  }
  btn.addEventListener('click', openPanel);
  closeBtn.addEventListener('click', closePanel);

  // Reset
  resetBtn.addEventListener('click', async () => {
    if (!confirm('Start a new conversation? This clears the current chat.')) return;
    try {
      await fetch(RESET_URL, {
        method: 'POST', credentials: 'same-origin',
        headers: { 'X-CSRFToken': getCsrf() },
      });
      msgsBox.innerHTML = '';
      msgsBox.appendChild(welcome);
      welcome.style.display = '';
      historyLoaded = true;
    } catch (e) {}
  });

  // Suggestions
  msgsBox.addEventListener('click', e => {
    const s = e.target.closest('.ai-suggestion');
    if (s) send(s.dataset.q);
  });

  // Composer
  composer.addEventListener('submit', e => {
    e.preventDefault();
    const t = input.value.trim();
    if (t) send(t);
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      composer.requestSubmit();
    }
  });
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 100) + 'px';
  });
})();
</script>
